<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer - HP Boss & Skill Player</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 800 },
            debug: false 
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);
let player;
let boss;
let platforms;
let cursors;
let spaceKey; // Tombol untuk skill player

// Group untuk peluru/proyektil
let bossProjectiles;
let playerProjectiles;

// Status Boss & HP
let bossState = 'IDLE';
let bossTimer = 0;
let bossHP = 100;
let maxBossHP = 100;
let bossHPBar;

// Logika arah hadap player (untuk menentukan arah tembakan)
let playerFacing = 'right'; 
let lastFired = 0; // Cooldown tembakan player

function preload() {
    // Load asset karakter utama
    this.load.spritesheet('dude', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });

    // Membuat visual Boss (Kotak Merah Besar)
    let bGraphics = this.make.graphics({ x: 0, y: 0, add: false });
    bGraphics.fillStyle(0xff0000, 1);
    bGraphics.fillRect(0, 0, 64, 64);
    bGraphics.generateTexture('bossSrc', 64, 64);

    // Membuat visual Bola Api Boss (Kuning)
    let fGraphics = this.make.graphics({ x: 0, y: 0, add: false });
    fGraphics.fillStyle(0xffff00, 1);
    fGraphics.fillCircle(8, 8, 8);
    fGraphics.generateTexture('fireball', 16, 16);

    // Membuat visual Peluru Player (Biru)
    let pBulletGraphics = this.make.graphics({ x: 0, y: 0, add: false });
    pBulletGraphics.fillStyle(0x00ffff, 1);
    pBulletGraphics.fillRect(0, 0, 12, 6);
    pBulletGraphics.generateTexture('playerBullet', 12, 6);
}

function create() {
    // 1. Buat Lingkungan & Platform
    platforms = this.physics.add.staticGroup();
    let ground = this.add.rectangle(400, 580, 800, 40, 0x666666);
    platforms.add(ground);
    let plat1 = this.add.rectangle(300, 430, 200, 20, 0x666666);
    platforms.add(plat1);

    // 2. Buat Player & Animasi
    player = this.physics.add.sprite(100, 450, 'dude');
    player.setBounce(0.1);
    player.setCollideWorldBounds(true);

    this.anims.create({
        key: 'left',
        frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
        frameRate: 10,
        repeat: -1
    });
    this.anims.create({
        key: 'turn',
        frames: [ { key: 'dude', frame: 4 } ],
        frameRate: 20
    });
    this.anims.create({
        key: 'right',
        frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
        frameRate: 10,
        repeat: -1
    });

    // 3. Buat Boss
    boss = this.physics.add.sprite(700, 450, 'bossSrc');
    boss.setCollideWorldBounds(true);

    // 4. Buat Wadah untuk Projectiles (Peluru)
    bossProjectiles = this.physics.add.group({ allowGravity: false });
    playerProjectiles = this.physics.add.group({ allowGravity: false });

    // 5. Menggambar Komponen HP Bar Boss di Layar Atas
    this.add.text(20, 20, 'BOSS HP:', { fontSize: '18px', fill: '#fff', fontWeight: 'bold' });
    bossHPBar = this.add.graphics();
    drawBossHPBar(); // Fungsi menggambar bar kotak darah

    // 6. Mengaktifkan Fungsi Tabrakan (Collision & Overlap)
    this.physics.add.collider(player, platforms);
    this.physics.add.collider(boss, platforms);
    
    // Deteksi jika player terkena serangan boss
    this.physics.add.overlap(player, bossProjectiles, hitPlayer, null, this);
    // Deteksi jika tembakan player mengenai tubuh boss
    this.physics.add.overlap(boss, playerProjectiles, hitBoss, null, this);

    // Input Control
    cursors = this.input.keyboard.createCursorKeys();
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE); // Tombol Spasi
}

function update(time, delta) {
    if (!player.active) return;

    // --- KONTROL GERAKAN & ARAH HADAP PLAYER ---
    if (cursors.left.isDown) {
        player.setVelocityX(-180);
        player.anims.play('left', true);
        playerFacing = 'left'; // Ingat bahwa player menghadap kiri
    } 
    else if (cursors.right.isDown) {
        player.setVelocityX(180);
        player.anims.play('right', true);
        playerFacing = 'right'; // Ingat bahwa player menghadap kanan
    } 
    else {
        player.setVelocityX(0);
        player.anims.play('turn');
    }

    if (cursors.up.isDown && player.body.touching.down) {
        player.setVelocityY(-450);
    }

    // --- KONTROL TEMBAKAN PLAYER (SKILL) ---
    // Player bisa menembak dengan SPASI, ada jeda waktu (cooldown) 300 milidetik biar tidak spam habis-habisan
    if (spaceKey.isDown && time > lastFired) {
        playerShoot(this);
        lastFired = time + 300; 
    }

    // --- LOGIKA STATE MACHINE BOSS ---
    if (bossHP > 0) {
        bossTimer += delta;
        if (bossState === 'IDLE') {
            if (bossTimer > 2000) {
                bossState = 'ATTACK';
                bossTimer = 0;
                bossAttack(this);
            }
        } else if (bossState === 'ATTACK') {
            if (bossTimer > 1000) {
                bossState = 'IDLE';
                bossTimer = 0;
            }
        }
    }
}

// Fungsi Menggambar/Update HP Bar di Layar
function drawBossHPBar() {
    bossHPBar.clear();
    
    // Background HP Bar (Warna Hitam/Abu gelap)
    bossHPBar.fillStyle(0x333333);
    bossHPBar.fillRect(110, 20, 300, 20);

    // Mengalkulasi persentase lebar darah tersisa
    let width = (bossHP / maxBossHP) * 300;

    if (width > 0) {
        // Isi HP Bar (Warna Merah)
        bossHPBar.fillStyle(0xff0000);
        bossHPBar.fillRect(110, 20, width, 20);
    }
}

// Fungsi Player Menggunakan Skill Menembak
function playerShoot(scene) {
    // Munculkan peluru tepat di depan tubuh player
    let offsetX = (playerFacing === 'right') ? 20 : -20;
    let bullet = playerProjectiles.create(player.x + offsetX, player.y, 'playerBullet');
    
    // Tentukan kecepatan dan arah gerak peluru berdasarkan arah hadap player
    if (playerFacing === 'right') {
        bullet.setVelocityX(400);
    } else {
        bullet.setVelocityX(-400);
    }

    // Hancurkan objek peluru setelah keluar layar (2 detik) demi performa memori
    scene.time.delayedCall(2000, () => {
        if (bullet.active) bullet.destroy();
    });
}

// Fungsi Tembakan Boss
function bossAttack(scene) {
    if (!player.active) return;
    let ball = bossProjectiles.create(boss.x, boss.y - 10, 'fireball');
    let angle = Phaser.Math.Angle.Between(boss.x, boss.y, player.x, player.y);
    scene.physics.velocityFromRotation(angle, 350, ball.body.velocity);

    scene.time.delayedCall(2500, () => {
        if (ball.active) ball.destroy();
    });
}

// Fungsi Jika Tembakan Player Berhasil Mengenai Boss
function hitBoss(bossObj, bullet) {
    bullet.destroy(); // Hancurkan peluru player yang mengenai boss
    
    bossHP -= 10; // Kurangi darah boss sebesar 10 poin
    if (bossHP < 0) bossHP = 0;
    
    drawBossHPBar(); // Perbarui tampilan visual darah di atas layar

    // Efek visual berkedip putih saat boss terkena damage
    bossObj.setTint(0xffffff);
    this.time.delayedCall(100, () => { bossObj.clearTint(); });

    // Cek Kondisi Menang jika HP Boss habis
    if (bossHP <= 0) {
        bossObj.destroy(); // Boss hancur/hilang dari map
        bossProjectiles.clear(true, true); // Bersihkan sisa-sisa bola api di layar
        
        this.physics.pause();
        this.add.text(280, 250, 'KAMU MENANG!\nBoss Berhasil Dikalahkan!', { 
            fontSize: '28px', 
            fill: '#00ff00',
            align: 'center' 
        });
    }
}

// Fungsi Jika Player Kalah Terkena Bola Api Boss
function hitPlayer(playerObj, fireball) {
    fireball.destroy();
    playerObj.setTint(0xff0000);
    playerObj.anims.play('turn');
    this.physics.pause();
    
    this.add.text(260, 250, 'GAME OVER\nRefresh browser untuk coba lagi', { 
        fontSize: '24px', 
        fill: '#fff',
        align: 'center' 
    });
    playerObj.active = false;
}
</script>

</body>
</html>
